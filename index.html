<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #444;
        }
        .container {
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .main-img {
            width: 100%;
            max-width: 350px; /* Upravte podle velikosti vašeho obrázku */
            height: auto;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #6c757d;
            margin-bottom: 30px;
        }
        .divider {
            height: 2px;
            width: 50px;
            background-color: #007bff;
            margin: 0 auto 30px auto;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="work.png" alt="Maintenance in progress" class="main-img">

    <div class="divider"></div>
    
    <h1>We'll be back soon</h1>
    <p>Our website is currently undergoing scheduled maintenance. We should be back online shortly. Thank you for your patience!</p>
    
    <div style="font-size: 0.85em; color: #adb5bd;">
        &copy; 2026 Your Company
    </div>
</div>

</body>
</html>
