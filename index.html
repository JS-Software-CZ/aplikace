            height: 70px;

            font-size: 2.2em;
        }

            color: #636e72;
            line-height: 1.6;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
