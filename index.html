<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 2em;
        }
        p {
            font-size: 1.1em;
            color: #7f8c8d;
            line-height: 1.6;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1.5s linear infinite;
            margin: 25px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .contact {
            margin-top: 20px;
            font-size: 0.9em;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://images.unsplash.com/photo-1581092921461-eab62e92c83e?auto=format&fit=crop&q=80&w=600" alt="Maintenance in progress">
    
    <h1>We'll be right back!</h1>
    <p>Our website is currently undergoing scheduled maintenance to improve your experience. We apologize for the inconvenience.</p>
    
    <div class="loader"></div>
    
    <p><strong>Thank you for your patience!</strong></p>
    
    <div class="contact">
        Need to reach us? <br>
        <a href="mailto:info@yourdomain.com" style="color: #3498db; text-decoration: none;">Contact Support</a>
    </div>
</div>

</body>
</html>
