<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | JS-Software</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        .main-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 16px;
            margin-bottom: 35px;
            /* Jemný stín pod obrázkem pro hloubku */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1.05em;
            line-height: 1.6;
            color: #57606f;
            margin-bottom: 35px;
        }
        .divider {
            height: 3px;
            width: 40px;
            background-color: #3498db;
            margin: 0 auto 25px auto;
            border-radius: 2px;
        }
        .footer {
            font-size: 0.9em;
            color: #a4b0be;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="work.png" alt="Maintenance in progress" class="main-img">

    <div class="divider"></div>
    
    <h1>We'll be back soon</h1>
    <p>Our website is currently undergoing scheduled maintenance. We are working hard to bring you a better experience.</p>
    
    <div class="footer">
        &copy; 2026 JS-Software
    </div>
</div>

</body>
</html>
